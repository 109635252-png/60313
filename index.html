<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無盡跑酷 (穩定優化版)</title>
    <!-- Importing a more game-like font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;7E00&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00f2ff;
            --secondary-glow: #ff00f2;
            --dark-bg: #0d1117;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Poppins', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
        }

        canvas {
            display: block;
        }

        #uiOverlay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 0 0 5px var(--primary-glow), 0 0 10px var(--primary-glow);
        }

        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px 60px;
            background-color: rgba(13, 17, 23, 0.7);
            border: 2px solid var(--primary-glow);
            border-radius: 16px;
            box-shadow: 0 0 25px var(--primary-glow);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 20;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #messageBox.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.9);
            pointer-events: none;
        }

        #messageBox h2 {
            font-size: 52px;
            margin: 0;
            color: var(--primary-glow);
            text-shadow: 0 0 10px var(--primary-glow), 0 0 20px var(--primary-glow);
        }

        #messageBox p {
            font-size: 20px;
            margin: 0;
            text-align: center;
            line-height: 1.6;
        }

        .action-button {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            color: var(--dark-bg);
            background: var(--primary-glow);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .action-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--primary-glow), 0 0 40px var(--secondary-glow);
        }
    </style>
</head>
<body>
    <div id="uiOverlay">
        <div>分數: <span id="score">0</span></div>
    </div>
    <div id="messageBox">
        <h2 id="messageTitle">無盡跑酷</h2>
        <p id="messageText">W/A/S/D 移動，空格鍵跳躍。<br>滑鼠移動控制視角。</p>
        <button id="startButton" class="action-button">開始遊戲</button>
        <button id="restartButton" class="action-button" style="display:none;">重新開始</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.min.js"></script>
    <script>
        // --- GAME CONSTANTS ---
        const JUMP_STRENGTH = 25;
        const GRAVITY = -30;
        const MOUSE_SENSITIVITY = 0.002;
        const CAMERA_DISTANCE = 10;
        const CAMERA_HEIGHT = 5;
        const CAMERA_LAG = 0.1;
        const INITIAL_FOV = 75; 
        
        const INITIAL_PLATFORMS = 15;
        const GENERATION_DISTANCE = 120;
        const DESPAWN_DISTANCE = 50;
        
        const PLAYER_SPEED = 35;

        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer;
        let world, playerBody;
        let playerGroup;
        let leftLegMesh, rightLegMesh, leftArmMesh, rightArmMesh;
        let keys = {};
        let gameStarted = false;
        let onGround = false;

        let platforms = [];
        let collectibleCoins = [];
        let particles = [];
        
        let score = 0;
        let distanceScore = 0;
        
        let cameraPitch = 0;
        
        const clock = new THREE.Clock();
        let animationFrameId = null;

        let coinSound = null;

        const ui = {
            scoreDisplay: document.getElementById('score'),
            messageBox: document.getElementById('messageBox'),
            messageTitle: document.getElementById('messageTitle'),
            messageText: document.getElementById('messageText'),
            startButton: document.getElementById('startButton'),
            restartButton: document.getElementById('restartButton')
        };
        
        // --- INITIALIZATION ---
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d1117);
            scene.fog = new THREE.Fog(0x0d1117, 60, 200);

            // Physics world setup
            world = new CANNON.World();
            world.gravity.set(0, GRAVITY, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            
            const playerMaterial = new CANNON.Material("playerMaterial");
            const platformMaterial = new CANNON.Material("platformMaterial");
            const contactMaterial = new CANNON.ContactMaterial(playerMaterial, platformMaterial, {
                friction: 0.1,      // Low friction to avoid getting stuck
                restitution: 0.0    // No bounciness
            });
            world.addContactMaterial(contactMaterial);

            // Camera setup
            camera = new THREE.PerspectiveCamera(INITIAL_FOV, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lighting setup
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0x00f2ff, 0.9);
            directionalLight.position.set(20, 30, 15);
            directionalLight.castShadow = true;
            directionalLight.shadow.camera.top = 40;
            directionalLight.shadow.camera.bottom = -40;
            directionalLight.shadow.camera.left = -40;
            directionalLight.shadow.camera.right = 40;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Add a visual floor grid
            const gridHelper = new THREE.GridHelper(500, 50, 0x00f2ff, 0x3d3d3d);
            gridHelper.position.y = -20;
            scene.add(gridHelper);

            createStarfield();

            // Create game elements
            createPlayer(playerMaterial); // Pass material to player
            resetGame(platformMaterial); // Pass material to platforms

            // Event Listeners
            document.addEventListener('keydown', (e) => keys[e.code] = true);
            document.addEventListener('keyup', (e) => keys[e.code] = false);
            ui.startButton.addEventListener('click', startGame);
            ui.restartButton.addEventListener('click', () => restartGame(platformMaterial));
            window.addEventListener('resize', onWindowResize);
            
            document.addEventListener('pointerlockchange', lockChangeAlert, false);
            document.addEventListener('mozpointerlockchange', lockChangeAlert, false);
        }

        // --- GAME OBJECT CREATION ---
        function createStarfield() {
            const starVertices = [];
            for (let i = 0; i < 10000; i++) {
                const x = THREE.MathUtils.randFloatSpread(2000);
                const y = THREE.MathUtils.randFloatSpread(2000);
                const z = THREE.MathUtils.randFloatSpread(2000);
                starVertices.push(x, y, z);
            }
            const starGeometry = new THREE.BufferGeometry();
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.7
            });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        function createPlatform(data, material) {
            const meshMaterial = new THREE.MeshStandardMaterial({ 
                color: data.color, 
                roughness: 0.8, 
                metalness: 0.2,
                emissive: data.color,
                emissiveIntensity: 0.2
            });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(data.size.x, data.size.y, data.size.z), meshMaterial);
            mesh.position.copy(data.pos);
            mesh.receiveShadow = true;
            scene.add(mesh);

            const body = new CANNON.Body({ mass: 0, material: material }); // Assign material
            body.addShape(new CANNON.Box(new CANNON.Vec3(data.size.x / 2, data.size.y / 2, data.size.z / 2)));
            body.position.copy(data.pos);
            world.addBody(body);
            
            platforms.push({ mesh, body });
        }
        
        function createCoin(position) {
            const geometry = new THREE.CylinderGeometry(0.7, 0.7, 0.2, 16);
            const material = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                metalness: 0.8,
                roughness: 0.4,
                emissive: 0xccac00,
                emissiveIntensity: 0.8
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(position);
            mesh.rotation.x = Math.PI / 2;
            mesh.castShadow = true;
            scene.add(mesh);
            
            collectibleCoins.push({ mesh });
        }

        function createPlayer(material) {
            playerGroup = new THREE.Group();
            
            const headMaterial = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.5 });
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff88, roughness: 0.5, emissive: 0x00ff88, emissiveIntensity: 0.3 });
            const legsMaterial = new THREE.MeshStandardMaterial({ color: 0x3d3d3d, roughness: 0.5 });

            const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.5), bodyMaterial);
            bodyMesh.position.y = 1.6;

            const headMesh = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), headMaterial);
            headMesh.position.y = 2.55;

            const armHeight = 1;
            const armGeo = new THREE.BoxGeometry(0.25, armHeight, 0.25);
            armGeo.translate(0, -armHeight / 2, 0);
            leftArmMesh = new THREE.Mesh(armGeo, headMaterial);
            leftArmMesh.position.set(-0.7, 2.2, 0);
            rightArmMesh = new THREE.Mesh(armGeo, headMaterial);
            rightArmMesh.position.set(0.7, 2.2, 0);

            const legHeight = 1;
            const legGeo = new THREE.BoxGeometry(0.35, legHeight, 0.4);
            legGeo.translate(0, -legHeight / 2, 0);
            leftLegMesh = new THREE.Mesh(legGeo, legsMaterial);
            leftLegMesh.position.set(-0.25, 1, 0);
            rightLegMesh = new THREE.Mesh(legGeo, legsMaterial);
            rightLegMesh.position.set(0.25, 1, 0);

            playerGroup.add(bodyMesh, headMesh, leftArmMesh, rightArmMesh, leftLegMesh, rightLegMesh);
            
            playerGroup.traverse(child => { if (child.isMesh) child.castShadow = true; });
            scene.add(playerGroup);

            // *** MODIFIED: Reverted to a stable box shape and tuned damping to fix jittering ***
            playerBody = new CANNON.Body({ 
                mass: 1, 
                position: new CANNON.Vec3(0, 5, 0),
                material: material,
                linearDamping: 0.4,   // Reduced damping to prevent jitter
                angularDamping: 0.8   // Added angular damping for rotational stability
            });

            // Using a single, stable box shape for the player's physics body.
            // The shape is offset so its bottom is at the body's y=0 position.
            const playerShape = new CANNON.Box(new CANNON.Vec3(0.5, 1.45, 0.5));
            playerBody.addShape(playerShape, new CANNON.Vec3(0, 1.45, 0));

            playerBody.angularFactor = new CANNON.Vec3(0, 1, 0); // Prevent tipping over

            // CCD is still useful for preventing pass-through at high speeds
            playerBody.ccdSpeedThreshold = 10;
            playerBody.ccdSweptSphereRadius = 0.5;

            world.addBody(playerBody);

            playerBody.addEventListener('collide', (event) => {
                const contactNormal = new CANNON.Vec3();
                if (event.contact.bi.id === playerBody.id) {
                    event.contact.ni.negate(contactNormal);
                } else {
                    contactNormal.copy(event.contact.ni);
                }
                if (contactNormal.dot(new CANNON.Vec3(0, 1, 0)) > 0.5) {
                    onGround = true;
                }
            });
        }
        
        // --- PARTICLE SYSTEMS ---
        function createJumpParticles() {
             for (let i = 0; i < 15; i++) {
                const particle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: 0x00f2ff }));
                particle.position.copy(playerGroup.position);
                particle.velocity = new THREE.Vector3((Math.random() - 0.5) * 4, Math.random() * 2 + 1, (Math.random() - 0.5) * 4);
                particle.lifetime = 1;
                scene.add(particle);
                particles.push(particle);
            }
        }
        
        function createCoinCollectParticles(position) {
            for (let i = 0; i < 15; i++) {
                const particle = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshBasicMaterial({ color: 0xffd700 }));
                particle.position.copy(position);
                particle.velocity = new THREE.Vector3((Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5, (Math.random() - 0.5) * 5);
                particle.lifetime = 0.5;
                scene.add(particle);
                particles.push(particle);
            }
        }

        // --- GAME STATE MANAGEMENT ---
        function resetGame(platformMaterial) {
            [platforms, collectibleCoins].forEach(arr => {
                arr.forEach(({ mesh, body }) => {
                    if (mesh) scene.remove(mesh);
                    if (body) world.remove(body);
                });
            });
            platforms = [];
            collectibleCoins = [];

            score = 0;
            distanceScore = 0;
            ui.scoreDisplay.textContent = score;

            ui.messageTitle.textContent = "無盡跑酷";
            ui.messageText.innerHTML = "W/A/S/D 移動，空格鍵跳躍。<br>滑鼠移動控制視角。";

            createPlatform({
                pos: new THREE.Vector3(0, -0.5, 0),
                size: new THREE.Vector3(20, 1, 20),
                color: 0x684523
            }, platformMaterial);

            for(let i = 0; i < INITIAL_PLATFORMS; i++) {
                generateNextPlatform(platformMaterial);
            }

            if (playerBody) {
                playerBody.position.set(0, 5, 0);
                playerBody.velocity.set(0, 0, 0);
                onGround = false;
            }
        }

        function startGame() {
            ui.messageBox.classList.add('hidden');
            gameStarted = true;
            
            if (typeof Tone !== 'undefined') {
                if (!coinSound) {
                    coinSound = new Tone.Synth({
                        oscillator: { type: 'sine' },
                        envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 }
                    }).toDestination();
                }
                if (Tone.context.state !== 'running') {
                    Tone.context.resume();
                }
            }

            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
            
            if (!animationFrameId) {
                clock.start();
                animate();
            }
        }

        function restartGame(platformMaterial) {
            resetGame(platformMaterial);
            startGame();
        }
        
        function endGame(title, message, showRestartButton) {
            gameStarted = false;
            ui.messageBox.classList.remove('hidden');
            ui.messageTitle.textContent = title;
            ui.messageText.textContent = message;
            ui.startButton.style.display = 'none';
            ui.restartButton.style.display = showRestartButton ? 'block' : 'none';
            document.exitPointerLock();
        }

        // --- PROCEDURAL GENERATION ---
        function generateNextPlatform(platformMaterial) {
            const lastPlatform = platforms[platforms.length - 1];
            const lastPos = lastPlatform.mesh.position;
            const lastSize = lastPlatform.mesh.geometry.parameters;

            const newSizeX = 5 + Math.random() * 10;
            const newSizeZ = 10 + Math.random() * 15;
            const newSize = new THREE.Vector3(newSizeX, 1, newSizeZ);
            
            const maxVerticalChange = 5;
            const offsetY = (Math.random() - 0.5) * 2 * maxVerticalChange;

            const heightDifference = Math.abs(offsetY);
            const maxGap = 18;
            const minGap = 4;
            const normalizedHeightDiff = Math.min(1, heightDifference / maxVerticalChange);
            const gap = minGap + (maxGap - minGap) * (1 - normalizedHeightDiff);

            const offsetX = (Math.random() - 0.5) * 20;

            const newPos = new THREE.Vector3(
                lastPos.x + offsetX,
                Math.max(-10, lastPos.y + offsetY),
                lastPos.z - lastSize.depth / 2 - newSize.z / 2 - gap
            );
            
            const randomColor = new THREE.Color().setHSL(Math.random(), 0.8, 0.6).getHex();
            createPlatform({ pos: newPos, size: newSize, color: randomColor }, platformMaterial);
            
            const coinCount = Math.floor(2 + Math.random() * 4);
            for (let i = 0; i < coinCount; i++) {
                const coinPos = new THREE.Vector3(
                    newPos.x + (Math.random() - 0.5) * (newSize.x * 0.8),
                    newPos.y + 1.5,
                    newPos.z + (Math.random() - 0.5) * (newSize.z * 0.8)
                );
                createCoin(coinPos);
            }
        }

        // --- UPDATE & ANIMATION LOGIC ---
        function updatePlayer() {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(playerGroup.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(playerGroup.quaternion);

            const velocity = new CANNON.Vec3(0, playerBody.velocity.y, 0);

            if (keys['KeyW']) {
                velocity.x += forward.x * PLAYER_SPEED;
                velocity.z += forward.z * PLAYER_SPEED;
            }
            if (keys['KeyS']) {
                velocity.x -= forward.x * PLAYER_SPEED;
                velocity.z -= forward.z * PLAYER_SPEED;
            }
            if (keys['KeyA']) {
                velocity.x += right.x * -PLAYER_SPEED;
                velocity.z += right.z * -PLAYER_SPEED;
            }
            if (keys['KeyD']) {
                velocity.x += right.x * PLAYER_SPEED;
                velocity.z += right.z * PLAYER_SPEED;
            }
            
            playerBody.velocity.x = velocity.x;
            playerBody.velocity.z = velocity.z;

            if (keys['Space'] && onGround) {
                playerBody.velocity.y = JUMP_STRENGTH;
                onGround = false;
                createJumpParticles();
            }
        }
        
        function updateCharacterAnimation(deltaTime) {
            const animationSpeed = 15;
            const swingAmount = 0.8;  
            const transitionSpeed = deltaTime * 10;
            const isMoving = onGround && (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']);

            if (isMoving) {
                const time = clock.getElapsedTime();
                const angle = Math.sin(time * animationSpeed) * swingAmount;
                leftLegMesh.rotation.x = THREE.MathUtils.lerp(leftLegMesh.rotation.x, angle, transitionSpeed);
                rightLegMesh.rotation.x = THREE.MathUtils.lerp(rightLegMesh.rotation.x, -angle, transitionSpeed);
                leftArmMesh.rotation.x = THREE.MathUtils.lerp(leftArmMesh.rotation.x, -angle, transitionSpeed);
                rightArmMesh.rotation.x = THREE.MathUtils.lerp(rightArmMesh.rotation.x, angle, transitionSpeed);
            } else {
                [leftLegMesh, rightLegMesh, leftArmMesh, rightArmMesh].forEach(limb => {
                    limb.rotation.x = THREE.MathUtils.lerp(limb.rotation.x, 0, transitionSpeed);
                });
            }
        }
        
        function checkCoinCollisions() {
            for (let i = collectibleCoins.length - 1; i >= 0; i--) {
                const coin = collectibleCoins[i];
                if (playerGroup.position.distanceTo(coin.mesh.position) < 2) {
                    score += 10;
                    if(coinSound) {
                        coinSound.triggerAttackRelease("G5", "8n");
                    }
                    createCoinCollectParticles(coin.mesh.position);
                    scene.remove(coin.mesh);
                    collectibleCoins.splice(i, 1);
                }
            }
        }

        function animate() {
            if (!gameStarted) {
                animationFrameId = null;
                return;
            }
            animationFrameId = requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            // --- Game Over Check ---
            if (playerBody.position.y < -25) {
                endGame('遊戲結束！', `你墜入了虛空\n最終分數: ${Math.floor(score + distanceScore)}`, true);
                return;
            }

            // --- Procedural Generation & Despawning ---
            if (platforms.length > 0) {
                const playerZ = playerBody.position.z;
                const platformMaterial = world.contactmaterials[0].materials[1];
                
                [[platforms, true], [collectibleCoins, false]].forEach(([arr, generateMore]) => {
                    for(let i = arr.length - 1; i >= 0; i--) {
                        if(arr[i].mesh.position.z > playerZ + DESPAWN_DISTANCE) {
                            scene.remove(arr[i].mesh);
                            if(arr[i].body) world.remove(arr[i].body);
                            arr.splice(i, 1);
                        }
                    }
                    if(generateMore) {
                        const lastPlatform = platforms[platforms.length - 1];
                        if (playerZ < lastPlatform.mesh.position.z + GENERATION_DISTANCE) {
                            generateNextPlatform(platformMaterial);
                        }
                    }
                });
            }

            // --- Physics & Game Logic ---
            world.step(1 / 60, deltaTime, 10);
            updatePlayer();
            updateCharacterAnimation(deltaTime);
            checkCoinCollisions();
            
            // Update distance score
            distanceScore = -playerBody.position.z;
            ui.scoreDisplay.textContent = Math.floor(score + distanceScore);

            // --- Update Visuals ---
            playerGroup.position.copy(playerBody.position);
            // This small offset helps align the visual model better with the physics model's base
            playerGroup.position.y -= 1.45; 
            playerGroup.quaternion.copy(playerBody.quaternion);

            particles.forEach((p, index) => {
                p.position.add(p.velocity.clone().multiplyScalar(deltaTime));
                p.velocity.y -= 25 * deltaTime;
                p.lifetime -= deltaTime;
                if (p.lifetime <= 0) {
                    scene.remove(p);
                    particles.splice(index, 1);
                }
            });
            
            collectibleCoins.forEach(coin => coin.mesh.rotation.z += deltaTime * 2);

            // --- Camera Update ---
            const orbitPoint = playerGroup.position.clone().add(new THREE.Vector3(0, 1.8, 0));
            const cameraOffset = new THREE.Vector3(0, CAMERA_HEIGHT, CAMERA_DISTANCE);
            
            const pitchQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), cameraPitch);
            const finalRotation = new THREE.Quaternion().multiplyQuaternions(playerGroup.quaternion, pitchQuat);
            cameraOffset.applyQuaternion(finalRotation);

            const targetCameraPos = orbitPoint.clone().add(cameraOffset);
            camera.position.lerp(targetCameraPos, CAMERA_LAG);
            camera.lookAt(orbitPoint);

            renderer.render(scene, camera);
        }

        // --- EVENT HANDLERS & CONTROLS ---
        function lockChangeAlert() {
            if (document.pointerLockElement === document.body) {
                document.addEventListener("mousemove", updateCameraWithMouse, false);
            } else {
                document.removeEventListener("mousemove", updateCameraWithMouse, false);
            }
        }
        
        function updateCameraWithMouse(event) {
            const movementX = event.movementX || 0;
            const movementY = event.movementY || 0;
            
            const horizontalRotation = new CANNON.Quaternion();
            horizontalRotation.setFromAxisAngle(new CANNON.Vec3(0, 1, 0), -movementX * MOUSE_SENSITIVITY);
            playerBody.quaternion = playerBody.quaternion.mult(horizontalRotation);

            cameraPitch -= movementY * MOUSE_SENSITIVITY;
            cameraPitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, cameraPitch));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>

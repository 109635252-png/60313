<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <title>絕地求生</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            background-color: #000;
            color: #fff;
            overflow: hidden; /* 隱藏滾動條 */
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #instructions {
            width: 60%;
            cursor: pointer;
        }
        #instructions h1 {
            font-size: 3em;
        }
        #instructions p {
            font-size: 1.2em;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference; /* 讓準星在不同背景下都可見 */
            z-index: 10;
            display: none; /* 預設隱藏 */
        }
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 1.5em;
            background-color: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
            display: none; /* 預設隱藏 */
            min-width: 200px;
        }
        .hud-item {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <h1>絕地求生</h1>
            <p style="font-size: 1.5em;">點擊螢幕開始遊戲</p>
            <p>
                W, A, S, D = 移動<br/>
                Shift = 滑鏟 (需向前移動時)<br/>
                空白鍵 = 跳躍<br/>
                滑鼠 = 環顧四周<br/>
                滑鼠左鍵 = 射擊<br/>
                滑鼠滾輪 = 縮放瞄準<br/>
                R = 換彈<br/>
                ESC = 解鎖滑鼠
            </p>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="hud">
        <div class="hud-item">❤️ 血量: <span id="health">100</span></div>
        <div class="hud-item">彈藥: <span id="ammo">55</span> / 55</div>
        <div class="hud-item">🎯 分數: <span id="score">0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        let objects = []; // 用於碰撞偵測 (地板、障礙物)
        let targets = []; // 專門存放目標方塊 (敵人)
        let raycaster;
        let muzzleFlash;

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        let isReloading = false;
        let isSliding = false;
        let slideCooldown = 0;

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // 玩家狀態
        let score = 0;
        let health = 100;
        const maxAmmo = 55;
        let ammo = maxAmmo;
        let lastDamageTime = 0;

        // HUD Elements
        const scoreElement = document.getElementById('score');
        const healthElement = document.getElementById('health');
        const ammoElement = document.getElementById('ammo');
        const hudElement = document.getElementById('hud');
        const crosshairElement = document.getElementById('crosshair');

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 10;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 0, 750);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.9);
            light.position.set(0.5, 1, 0.75);
            scene.add(light);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(-100, 100, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 100;
            dirLight.shadow.camera.bottom = -100;
            dirLight.shadow.camera.left = -100;
            dirLight.shadow.camera.right = 100;
            scene.add(dirLight);

            raycaster = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 10);

            // 地板
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, 2000, 100, 100),
                new THREE.MeshLambertMaterial({ color: 0x4CAF50 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            objects.push(floor);

            // 牆壁和障礙物 (不再造成傷害)
            const boxGeometry = new THREE.BoxGeometry(20, 20, 20);
            for (let i = 0; i < 50; i++) {
                const box = new THREE.Mesh(
                    boxGeometry,
                    new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                );
                box.position.set(
                    Math.floor(Math.random() * 20 - 10) * 20,
                    10,
                    Math.floor(Math.random() * 20 - 10) * 20
                );
                box.castShadow = true;
                box.receiveShadow = true;
                // **修正**: 移除傷害屬性
                // box.userData.isDamaging = true; 
                scene.add(box);
                objects.push(box);
            }

            // 初始射擊目標 (敵人)
            for (let i = 0; i < 50; i++) {
                spawnTarget();
            }
            
            // 武器模型
            const gunMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.8 });
            const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.3, 1), gunMaterial);
            const gunBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8, 16), gunMaterial);
            gunBarrel.position.z = -0.9;
            gunBarrel.rotation.x = Math.PI / 2;
            
            const gun = new THREE.Group();
            gun.add(gunBody);
            gun.add(gunBarrel);
            gun.position.set(0.5, -0.4, -1.2);
            gun.rotation.y = -0.1;
            camera.add(gun);

            // 槍口火焰
            muzzleFlash = new THREE.PointLight(0xffa500, 0, 50, 2);
            muzzleFlash.position.set(0, 0, -0.8);
            gunBarrel.add(muzzleFlash);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            controls = new PointerLockControls(camera, document.body);

            const blocker = document.getElementById('blocker');
            const instructions = document.getElementById('instructions');

            instructions.addEventListener('click', () => {
                if (!controls.isLocked) {
                    controls.lock();
                }
            });

            controls.addEventListener('lock', () => {
                instructions.style.display = 'none';
                blocker.style.display = 'none';
                hudElement.style.display = 'block';
                crosshairElement.style.display = 'block';
            });

            controls.addEventListener('unlock', () => {
                blocker.style.display = 'flex';
                instructions.style.display = '';
                hudElement.style.display = 'none';
                crosshairElement.style.display = 'none';
            });

            scene.add(controls.getObject());

            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight': case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump && !isSliding) velocity.y += 350; canJump = false; break;
                    case 'KeyR': reload(); break;
                    case 'ShiftLeft': case 'ShiftRight':
                        if (moveForward && !isSliding && slideCooldown <= 0 && canJump) {
                            startSlide();
                        }
                        break;
                }
            };

            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'ArrowUp': case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight': case 'KeyD': moveRight = false; break;
                }
            };
            
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onShoot);
            document.addEventListener('wheel', onMouseWheel);

            window.addEventListener('resize', onWindowResize);
        }
        
        function onMouseWheel(event) {
            if (!controls.isLocked) return;

            camera.fov -= event.deltaY * 0.05;
            camera.fov = Math.max(20, Math.min(75, camera.fov));
            camera.updateProjectionMatrix();
        }

        function startSlide() {
            isSliding = true;
            canJump = false;
            velocity.z -= 800;
            slideCooldown = 1.5;
            setTimeout(() => {
                isSliding = false;
            }, 500);
        }

        function spawnTarget() {
            const targetGeometry = new THREE.BoxGeometry(10, 10, 10);
            const target = new THREE.Mesh(
                targetGeometry,
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            target.position.set(
                (Math.random() - 0.5) * 800,
                Math.random() * 50 + 10,
                (Math.random() - 0.5) * 800
            );
            target.castShadow = true;
            target.userData.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 40,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 40
            );
            scene.add(target);
            targets.push(target);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function onShoot(event) {
            if (!controls.isLocked || event.button !== 0 || isReloading || ammo <= 0) return;
            
            ammo--;
            ammoElement.textContent = `${ammo} / ${maxAmmo}`;

            muzzleFlash.intensity = 20;
            setTimeout(() => { muzzleFlash.intensity = 0; }, 80);

            const shootRaycaster = new THREE.Raycaster();
            shootRaycaster.setFromCamera({ x: 0, y: 0 }, camera);

            const intersects = shootRaycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const intersectedObject = intersects[0].object;
                scene.remove(intersectedObject);
                targets = targets.filter(t => t !== intersectedObject);
                
                score++;
                scoreElement.textContent = score;

                spawnTarget();
            }
        }
        
        function reload() {
            if (isReloading || ammo === maxAmmo) return;
            isReloading = true;
            ammoElement.textContent = `換彈中...`;
            
            setTimeout(() => {
                ammo = maxAmmo;
                ammoElement.textContent = `${ammo} / ${maxAmmo}`;
                isReloading = false;
            }, 1500);
        }

        function takeDamage(amount) {
            const time = performance.now();
            if (time - lastDamageTime < 1000) return; // 1秒無敵時間

            lastDamageTime = time;
            health -= amount;
            health = Math.max(0, health);
            healthElement.textContent = health;

            if (health <= 0) {
                endGame();
            }
        }

        function endGame() {
            const instructions = document.getElementById('instructions');
            instructions.innerHTML = `<h1>遊戲結束</h1><p>您的血量已耗盡</p><p>最終得分: ${score}</p><p>點擊以重新開始</p>`;
            instructions.removeEventListener('click', () => controls.lock());
            instructions.addEventListener('click', () => location.reload());
            controls.unlock();
        }

        // **修正**: 檢查與敵人的碰撞
        function checkCollisions() {
            const playerPosition = controls.getObject().position;
            const playerHeight = isSliding ? 5 : 10;
            const playerCollider = new THREE.Box3(
                new THREE.Vector3(playerPosition.x - 2, playerPosition.y - playerHeight, playerPosition.z - 2),
                new THREE.Vector3(playerPosition.x + 2, playerPosition.y, playerPosition.z + 2)
            );

            // 遍歷所有敵人
            for (const target of targets) {
                const enemyBox = new THREE.Box3().setFromObject(target);
                if (enemyBox.intersectsBox(playerCollider)) {
                    takeDamage(10); // 如果碰撞到敵人，則受到傷害
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (slideCooldown > 0) {
                slideCooldown -= delta;
            }

            if (controls.isLocked === true) {
                const player = controls.getObject();
                const targetHeight = isSliding ? 5 : 10;
                player.position.y += (targetHeight - player.position.y) * 20 * delta;

                raycaster.ray.origin.copy(player.position);
                raycaster.ray.origin.y -= player.position.y;
                const onObject = raycaster.intersectObjects(objects, false).length > 0;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (!isSliding) {
                    if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;
                }

                if (onObject) {
                    velocity.y = Math.max(0, velocity.y);
                    if (!isSliding) canJump = true;
                }

                player.translateX(-velocity.x * delta);
                player.translateZ(velocity.z * delta);
                player.position.y += (velocity.y * delta);

                if (player.position.y < targetHeight) {
                    velocity.y = 0;
                    player.position.y = targetHeight;
                    if (!isSliding) canJump = true;
                }

                checkCollisions(); // 在每一幀都檢查碰撞
            }

            targets.forEach(target => {
                target.position.add(target.userData.velocity.clone().multiplyScalar(delta));
                if (Math.abs(target.position.x) > 450) target.userData.velocity.x *= -1;
                if (target.position.y < 5 || target.position.y > 100) target.userData.velocity.y *= -1;
                if (Math.abs(target.position.z) > 450) target.userData.velocity.z *= -1;
            });

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
